# MobileFCMViTv3-S ablation config — FCM disabled
# Sets fcm_lambda=0.0 so the clustering loss contributes nothing,
# and fusion receives a uniform membership map (no semantic signal).
# Used to isolate the contribution of feature-space FCM fusion.

model: mobilefcmvitv3_s
num_classes: 3

pretrained_weights: baseline/Models/MobileViTv3-v1/results_segmentation/mobilevitv3_S_voc_e50_7959/checkpoint_ema_best.pt

# Differentiable soft clustering — lambda=0 disables both auxiliary losses
fcm_k: 3
fcm_proj_dim: 32
tau: 1.0
fcm_m: 2.0
membership: softmax
normalize_feat: true
fusion_type: attention
lambda_clust: 0.0     # disabled — no compactness signal
lambda_entropy: 0.0   # disabled — no entropy signal

dropout: 0.1
attn_dropout: 0.0
ffn_dropout: 0.0
drop_path_rate: 0.1

batch_size: 32
validation_batch_size: 16
epochs: 150
lr: 6.25e-5
warmup_lr: 6.25e-8
min_lr: 6.25e-7
warmup_epochs: 20
weight_decay: 0.01
opt: adamw
opt_eps: 1.0e-8
opt_betas: [0.9, 0.999]
clip_grad: 5.0
clip_mode: norm

sched: cosine
cooldown_epochs: 10

color_jitter: 0.2
hflip: 0.5
scale: [0.08, 1.0]
ratio: [0.75, 1.3333333333333333]
mixup: 0.2
cutmix: 0.2
mixup_prob: 0.3
mixup_switch_prob: 0.5
smoothing: 0.1

use_class_weights: true
drop_rate: 0.1
amp: true
workers: 8
pin_mem: true
log_wandb: true
model_ema: true
model_ema_decay: 0.9998
patience_epochs: 40
seed: 42
eval_metric: top1
checkpoint_dir: checkpoints/mobilefcmvitv3_s_BUSI_no_fcm
results_dir: results/mobilefcmvitv3_s_BUSI_no_fcm
