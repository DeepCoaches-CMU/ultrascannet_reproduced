# tuning/tune_03_seed2.yaml
#
# Tuning run 03 — repeat of tune_01 best config with seed=123
#
# Motivation:
#   tune_01 showed seed variance (92.95% vs 90.38%). A third independent run
#   gives us mean ± std to report in the paper.
#
# Changes from tune_01_lr_aug.yaml:
#   seed: 42 → 123
#   checkpoint_dir / results_dir → tuning/tune_03_seed2/

model: mobilefcmvitv3_s
num_classes: 3

pretrained_weights: baseline/Models/MobileViTv3-v1/results_segmentation/mobilevitv3_S_voc_e50_7959/checkpoint_ema_best.pt

# ── Feature-space differentiable soft clustering ──────────────────────────────
fcm_k: 3
fcm_proj_dim: 32
tau: 1.0
fcm_m: 2.0
membership: softmax
normalize_feat: true
fusion_type: attention
lambda_clust: 0.01
lambda_entropy: 0.0

# Architecture
dropout: 0.1
attn_dropout: 0.0
ffn_dropout: 0.0
drop_path_rate: 0.1

# Training — identical to tune_01
batch_size: 32
validation_batch_size: 16
epochs: 200
lr: 5.0e-4
warmup_lr: 5.0e-7
min_lr: 5.0e-7
warmup_epochs: 10
weight_decay: 0.01
opt: adamw
opt_eps: 1.0e-8
opt_betas: [0.9, 0.999]
clip_grad: 5.0
clip_mode: norm

sched: cosine
cooldown_epochs: 10

color_jitter: 0.4
hflip: 0.5
vflip: 0.3
scale: [0.08, 1.0]
ratio: [0.75, 1.3333333333333333]
mixup: 0.2
cutmix: 0.2
mixup_prob: 0.3
mixup_switch_prob: 0.5
smoothing: 0.1

use_class_weights: true
drop_rate: 0.1
amp: true
workers: 8
pin_mem: true
log_wandb: true
model_ema: true
model_ema_decay: 0.9998
patience_epochs: 60
seed: 123
eval_metric: top1
checkpoint_dir: tuning/tune_03_seed2/checkpoints
results_dir: tuning/tune_03_seed2/results
